<!DOCTYPE html>
<html lang="hu">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Rózsa Zoltán # Szoftverfejlesztő</title>
	
	<script>
		const findProject = () => {
			const url = window.location.href
			const domain = 'https://rozsazoltan.github.io';
			const folders = [
				'portfolio',
				'learning',
			];

			for (const folder of folders) {
				const current = `${domain}/${folder}`;
				if (url.startsWith(current)) {
					location.href = `${current}/index.html?${url.replace(`${current}/`, '')}`;
					return;
				}
			}

			location.href = `${domain}/${folders[0]}`;
		};
		findProject();
	</script>
</head>
<body>
	<div id="prod">
		<div>Rózsa Zoltán # Szoftverfejlesztő</div>
		<hr>
		<div>Engedélyezze a JavaScript használatát!</div>
		<hr>

	</div>
</body>
</html>
